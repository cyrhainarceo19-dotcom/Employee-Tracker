<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Tracker - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-chart-line"></i>
                <h1>Employee Tracker</h1>
                <p>Employee Performance Monitoring System</p>
            </div>
            
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
            </div>
            
            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-login">Login <i class="fas fa-arrow-right"></i></button>
            </form>
            
            <!-- Sign Up Form with Role Selection -->
            <form id="signupForm" class="auth-form">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="signupName" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="signupEmail" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" required>
                </div>
                
                <!-- Role Selection -->
                <div class="input-group">
                    <i class="fas fa-user-tag"></i>
                    <select id="signupRole" required>
                        <option value="user">👨‍🎓 Employee</option>
                    </select>
                </div>
                
                <!-- Employee Fields -->
                <div id="studentFields">
                    <div class="input-group">
                        <i class="fas fa-user-tie"></i>
                        <input type="text" id="signupCourse" placeholder="Department">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-building"></i>
                        <input type="text" id="signupSchool" placeholder="Position">
                    </div>
                </div>
                
                <button type="submit" class="btn-login">Sign Up <i class="fas fa-user-plus"></i></button>
            </form>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase-client.js"></script>
    <script src="api.js"></script>
    <script src="login.js"></script>
</body>
</html>
